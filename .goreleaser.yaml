version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: cc-router
    binary: cc-router
    main: ./cmd/ccr
    ldflags:
      - -s -w
    targets:
      - windows_amd64
      - linux_amd64
      - linux_arm64
      - darwin_amd64
      - darwin_arm64

archives:
  - id: default
    name_template: >-
      cc-router_
      {{- .Os | title }}_
      {{- if eq .Arch "amd64" }}x86_64{{ else }}{{ .Arch }}{{ end }}
    wrap_in_directory: false
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: blobbyblo
    name: ClaudeCodeRouter
